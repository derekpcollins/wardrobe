<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Wardrobe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="filter-bar">
      <div class="filter-row filter-row--seasons">
        <div class="pill-group" id="season-filters"></div>
        <button id="reset-btn" class="reset-btn">Reset</button>
      </div>
      <div class="filter-row filter-row--toggles">
        <div class="toggle-group" id="status-filter"></div>
        <div class="toggle-group" id="replacement-filter"></div>
      </div>
      <div class="filter-row filter-row--scroll">
        <div class="pill-group" id="category-filters"></div>
      </div>
      <div class="filter-row">
        <select id="brand-filter" class="brand-select">
          <option value="">All Brands</option>
        </select>
      </div>
    </header>

    <main id="main">
      <div id="item-list">
        <div class="loading">Loading&hellip;</div>
      </div>
    </main>

    <button id="fab" aria-label="Add item">+</button>

    <div id="modal-backdrop" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div id="modal">
        <div id="modal-handle"></div>
        <div id="modal-header">
          <button id="modal-cancel-btn">Cancel</button>
          <h2 id="modal-title">Add Item</h2>
          <button id="modal-save-btn">Save</button>
        </div>
        <div id="modal-body"></div>
      </div>
    </div>

  </div>

  <div id="notice">Changes download as wardrobe.json &mdash; replace in repo to save permanently</div>

  <script src="app.js"></script>
</body>
</html>
