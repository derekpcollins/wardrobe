<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Wardrobe">
  <meta name="theme-color" content="#f59526">
  <title>Wardrobe</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/42976baa39.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
  <script>(function(){var t=localStorage.getItem('wardrobe-theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
</head>
<body>
  <div id="app">

    <header id="header">
      <div class="season-selector-wrap">
        <h1 class="season-h1" id="season-h1">
          <span id="season-name">Spring</span><i class="fa-sharp fa-light fa-angle-down season-chevron"></i>
        </h1>
        <select class="season-select-overlay" id="season-select" aria-label="Select season">
          <option value="spring">Spring</option>
          <option value="summer">Summer</option>
          <option value="fall">Fall</option>
          <option value="winter">Winter</option>
          <option value="">All Seasons</option>
        </select>
      </div>
      <div class="header-actions">
        <button class="filter-icon-btn" id="theme-toggle-btn" aria-label="Switch to dark mode">
          <span class="theme-icon theme-icon--moon">🌙</span>
          <span class="theme-icon theme-icon--sun">☀️</span>
        </button>
        <button class="filter-icon-btn filter-btn" id="filter-btn" aria-label="Open filters">
          <i class="fa-light fa-sliders-up"></i>
          <span class="filter-dot" id="filter-dot"></span>
        </button>
      </div>
    </header>

    <main id="main">
      <div id="item-list">
        <div class="loading">Loading&hellip;</div>
      </div>
    </main>

    <footer id="app-footer">
      <button id="refresh-cache-btn" class="refresh-cache-btn">Refresh data</button>
    </footer>

  </div>

  <!-- Filter drawer — outside #app so it isn't clipped by max-width -->
  <div id="drawer-backdrop" class="hidden"></div>
  <aside id="filter-drawer" aria-label="Filters">
    <div class="drawer-header">
      <h3 class="drawer-title">Filters</h3>
      <button class="drawer-close-btn" id="drawer-close-btn" aria-label="Close filters">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <div class="drawer-section-label">Status</div>
        <div class="toggle-group" id="drawer-status"></div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Replacement</div>
        <div class="toggle-group" id="drawer-replacement"></div>
        <div class="toggle-group drawer-retiring-group" id="drawer-retiring"></div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Category</div>
        <div class="pill-group" id="drawer-categories"></div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Brand</div>
        <select id="drawer-brand" class="brand-select drawer-brand-select"></select>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="drawer-reset-btn" id="drawer-reset-btn">Reset</button>
      <button class="drawer-apply-btn" id="drawer-apply-btn">Apply</button>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
